<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Notícia</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 800px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

img {
  width: 100%;
}
</style>

</head>
<body>

<div class="container" id="conteudo"></div>

<script>
let noticias = JSON.parse(localStorage.getItem("noticias")) || [];
let index = localStorage.getItem("noticiaSelecionada");

let n = noticias[index];

document.getElementById("conteudo").innerHTML = `
  <h1>${n.titulo}</h1>
  <img src="${n.imagem}">
  <p>${n.conteudo}</p>
`;
</script>

</body>
</html>
